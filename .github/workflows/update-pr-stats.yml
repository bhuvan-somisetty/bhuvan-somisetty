name: Update PR Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-pr-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PR Count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(curl -s -H "Authorization: token $GH_TOKEN"             "https://api.github.com/search/issues?q=type:pr+author:bhuvan-somisetty"             | python3 -c "import sys,json; print(json.load(sys.stdin)['total_count'])")

          sed -i "s|<!--PR_COUNT-->[0-9]*<!--/PR_COUNT-->|<!--PR_COUNT-->${TOTAL}<!--/PR_COUNT-->|g" README.md

      - name: Commit if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update PR count [skip ci]" && git push)
